name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # PyPI Trusted Publishing

jobs:
  test:
    # Re-run the full test matrix on the tagged commit before we ship it,
    # so a tag pointing at a commit that was never green never reaches PyPI.
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$TAG" != "$PYPROJECT" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $PYPROJECT"
            exit 1
          fi
          echo "Tag and pyproject agree on version $TAG"

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi  # configure trusted publisher in PyPI for this env
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
