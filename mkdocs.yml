site_name: vaultly
site_description: Declarative Pydantic-native secrets manager for Python.
site_url: https://dspiridonov.github.io/vaultly/
repo_url: https://github.com/dspiridonov/vaultly
repo_name: dspiridonov/vaultly
docs_dir: docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
    default: latest

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Concepts:
      - SecretModel: concepts/secret-model.md
      - Secret marker: concepts/secret-marker.md
      - Backends: concepts/backends.md
      - Path interpolation: concepts/path-interpolation.md
      - Caching: concepts/caching.md
      - Errors: concepts/errors.md
  - Guides:
      - Choosing a backend: guides/choosing-a-backend.md
      - AWS SSM Parameter Store: guides/aws-ssm.md
      - HashiCorp Vault: guides/vault.md
      - Retries and stale-on-error: guides/retries-and-stale.md
      - Nested config trees: guides/nested-config.md
      - Concurrency: guides/concurrency.md
      - Security model: guides/security-model.md
      - Testing your config: guides/testing.md
  - Reference:
      - API: reference/api.md
